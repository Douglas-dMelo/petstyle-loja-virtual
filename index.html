<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Configuração de caracteres -->
    <meta charset="UTF-8" />

    <!-- Responsividade mobile-first -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pet&Style - Loja de Pets</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS custom -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="bg-gray-50">
    <!-- HEADER -->

    <header class="bg-white shadow">
      <div
        class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-purple-600">Pet&Style</h1>

        <nav class="flex gap-6">
          <a href="#produtos" class="hover:text-purple-600">Produtos</a>
          <a href="#depoimentos" class="hover:text-purple-600">Depoimentos</a>
          <a href="#contato" class="hover:text-purple-600">Contato</a>

          <button
            onclick="toggleCart()"
            class="bg-purple-600 text-white px-4 py-2 rounded-lg">
            Carrinho
          </button>
        </nav>
      </div>
    </header>

    <!-- HERO -->

    <section class="py-20 text-center">
      <h2 class="text-4xl font-bold mb-4">Estilo e conforto para seu pet</h2>

      <p class="text-gray-600 mb-8">
        Produtos premium para pets cheios de personalidade
      </p>

      <a href="#produtos" class="bg-purple-600 text-white px-6 py-3 rounded-lg">
        Ver produtos
      </a>
    </section>

    <!-- PRODUTOS -->

    <section id="produtos" class="max-w-6xl mx-auto py-16 px-4">
      <h2 class="text-3xl font-bold text-center mb-12">Nossos Produtos</h2>

      <div
        id="productsContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- produtos serão gerados pelo JS -->
      </div>
    </section>

    <!-- CARRINHO -->

    <div
      id="cartSidebar"
      class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-6 translate-x-full transition">
      <h2 class="text-xl font-bold mb-4">Carrinho</h2>

      <div id="cartItems"></div>

      <p class="font-bold mt-4">Total: R$ <span id="cartTotal">0</span></p>

      <button
        onclick="toggleCart()"
        class="mt-4 bg-purple-600 text-white px-4 py-2 rounded">
        Fechar
      </button>
    </div>

    <!-- SCRIPTS -->

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
